name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  typecheck:
    name: Typecheck App + Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck app
        run: npm run typecheck

      - name: Typecheck supabase
        run: npm run typecheck:supabase

      - name: Unified typecheck command
        run: npm run typecheck:all
